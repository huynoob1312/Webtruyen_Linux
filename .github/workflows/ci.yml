name: CI/CD
# CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t webtruyen-linux:latest .

# CD
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push Docker Image
      run: |
        docker tag webtruyen-linux:latest ${{ secrets.DOCKER_USERNAME }}/webtruyen-linux:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/webtruyen-linux:latest
    
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd project/Webtruyen_Linux/
          git pull origin main
          sudo docker-compose down
          sudo docker-compose up -d --build
